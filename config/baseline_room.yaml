# Room: origin bottom-left; x right, y up (meters)
room:
  width_m: 12.0
  height_m: 8.0

gateways:
  - id: A1
    x_m: 0.0
    y_m: 0.0
    tx_power_dbm: -59.0
  - id: A2
    x_m: 12.0
    y_m: 0.0
    tx_power_dbm: -59.0
  - id: A3
    x_m: 0.0
    y_m: 8.0
    tx_power_dbm: -59.0
  - id: A4
    x_m: 12.0
    y_m: 8.0
    tx_power_dbm: -59.0

rssi_model:
  path_loss_exponent: 2.2
  noise_sigma_db: 3.0
  min_distance_m: 0.5

fingerprint:
  train_grid_spacing_m: 1.0
  test_grid_spacing_m: 1.0
  test_offset_x_m: 0.5
  test_offset_y_m: 0.5
  train_samples_per_point: 40
  random_seed: 42

baseline:
  k_neighbors: 3
  weights: distance
  standardize_rssi: true

# Uniform grid over the room: n_zones = nx * ny. Here 3×2 = 6 square cells (12m×8m → ~4m×4m each).
spatial_zones:
  nx: 3
  ny: 2

trajectory_dataset:
  n_sessions: 14
  steps_per_session: 320
  step_m: 0.35
  brownian_std_m: 0.1
  start_margin_m: 0.45
  gateway_reception_prob: 0.86
  min_visible_gateways: 3
  missing_rssi_dbm: -105.0
  seed: 42

zone_knn:
  k_neighbors: 15
  weights: distance

fingerprint_rf:
  n_estimators: 150
  max_depth: 16
  random_state: 42
  standardize_rssi: true

training_data:
  training_trace_csv: "data/simulated/training_trace.csv"

sionna_rt:
  carrier_frequency_hz: 2.4e9
  max_depth: 5
  num_samples: 1000000
  grid_resolution_m: 0.25
  gateway_height_m: 2.5
  rx_height_m: 1.0
  wall_material: concrete
  cache_file: data/simulated/sionna_rt_cache.npz
