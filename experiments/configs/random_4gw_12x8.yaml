# Gateways: 4, random positions (numpy seed=7, uniform in [0.5, 11.5] x [0.5, 7.5])
# Room: 12x8 m — baseline size
room:
  width_m: 12.0
  height_m: 8.0

gateways:
  - {id: A1, x_m:  7.4, y_m: 2.6, tx_power_dbm: -59.0}
  - {id: A2, x_m: 10.4, y_m: 6.6, tx_power_dbm: -59.0}
  - {id: A3, x_m:  9.0, y_m: 0.5, tx_power_dbm: -59.0}
  - {id: A4, x_m:  3.0, y_m: 6.2, tx_power_dbm: -59.0}

rssi_model:
  path_loss_exponent: 2.2
  noise_sigma_db: 3.0
  min_distance_m: 0.5

fingerprint:
  train_grid_spacing_m: 1.0
  train_samples_per_point: 40
  random_seed: 42

baseline:
  k_neighbors: 3
  weights: distance
  standardize_rssi: true

spatial_zones:
  nx: 3
  ny: 2

trajectory_dataset:
  n_sessions: 14
  steps_per_session: 320
  step_m: 0.35
  brownian_std_m: 0.1
  start_margin_m: 0.45
  gateway_reception_prob: 0.86
  min_visible_gateways: 3
  missing_rssi_dbm: -105.0
  seed: 42

zone_knn:
  k_neighbors: 15
  weights: distance

fingerprint_rf:
  n_estimators: 150
  max_depth: 16
  random_state: 42
  standardize_rssi: true

training_data:
  training_trace_csv: "data/simulated/random_4gw_12x8/training_trace.csv"

sionna_rt:
  carrier_frequency_hz: 2.4e9
  max_depth: 5
  num_samples: 1000000
  grid_resolution_m: 0.25
  gateway_height_m: 2.5
  rx_height_m: 1.0
  wall_material: concrete
  cache_file: data/simulated/random_4gw_12x8/sionna_rt_cache.npz
